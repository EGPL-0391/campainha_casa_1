<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aguarde — Morador sendo contactado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #166534;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 80px; margin-bottom: 2rem; animation: bounce 1.5s infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 { color: #ffffff; font-size: clamp(1.6rem, 5vw, 2.4rem); font-weight: 700; line-height: 1.3; margin-bottom: 1rem; }
    p { color: rgba(255, 255, 255, 0.85); font-size: clamp(1rem, 3vw, 1.25rem); line-height: 1.6; }
    .card { background: rgba(255, 255, 255, 0.12); border-radius: 20px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; border: 1px solid rgba(255, 255, 255, 0.2); }
    .status { display: inline-flex; align-items: center; gap: 8px; border-radius: 50px; padding: 8px 18px; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 500; transition: all 0.4s ease; }
    .status.enviando { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }
    .status.sucesso { background: rgba(74, 222, 128, 0.25); color: #bbf7d0; }
    .status.erro { background: rgba(239, 68, 68, 0.3); color: #fecaca; }
    .dot { width: 8px; height: 8px; border-radius: 50%; animation: blink 1s infinite; }
    .enviando .dot { background: #facc15; }
    .sucesso .dot  { background: #4ade80; animation: none; }
    .erro .dot     { background: #f87171; animation: none; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    #detalhe-erro { display: none; margin-top: 1rem; font-size: 0.78rem; color: rgba(255,255,255,0.5); word-break: break-all; }
    #btn-tentar { display: none; margin-top: 1.2rem; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; font-size: 0.9rem; padding: 10px 22px; border-radius: 50px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔔</div>
    <h1>Por favor, aguarde um minuto!</h1>
    <p>O morador já foi contactado.</p>
    <div class="status enviando" id="status">
      <div class="dot"></div>
      <span id="status-texto">Enviando aviso...</span>
    </div>
    <div id="detalhe-erro"></div>
    <button id="btn-tentar" onclick="enviarNotificacao()">Tentar novamente</button>
  </div>
  <script>
    const TOPICO   = "campainha_casa_1";
    const MENSAGEM = "Alguém está na portaria!";
    const TITULO   = "🔔 CAMPAINHA";
    const NTFY_URL = `https://ntfy.sh/${TOPICO}`;

    async function enviarNotificacao() {
      const statusEl = document.getElementById("status");
      const textoEl  = document.getElementById("status-texto");
      const detEl    = document.getElementById("detalhe-erro");
      const btnEl    = document.getElementById("btn-tentar");
      statusEl.className = "status enviando";
      textoEl.textContent = "Enviando aviso...";
      detEl.style.display = "none";
      btnEl.style.display = "none";
      try {
        const resposta = await fetch(NTFY_URL, {
          method: "POST",
          headers: {
            "Title": TITULO,
            "Priority": "urgent",
            "Tags": "bell,rotating_light",
            "Content-Type": "text/plain"
          },
          body: MENSAGEM
        });
        if (!resposta.ok) throw new Error(`HTTP ${resposta.status}`);
        statusEl.className = "status sucesso";
        textoEl.textContent = "✓ Aviso enviado com sucesso";
      } catch (err) {
        statusEl.className = "status erro";
        textoEl.textContent = "✗ Falha ao enviar aviso";
        detEl.textContent = `Detalhe: ${err.message}`;
        detEl.style.display = "block";
        btnEl.style.display = "inline-block";
        console.error("Erro ntfy:", err);
      }
    }
    enviarNotificacao();
  </script>
</body>
</html>

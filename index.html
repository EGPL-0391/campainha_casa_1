<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campainha</title>

  <style>
    body {
      font-family: sans-serif;
      background: #166534;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .box {
      background: rgba(255,255,255,0.1);
      padding: 2rem;
      border-radius: 16px;
    }
    .status {
      margin-top: 1rem;
      font-size: 0.95rem;
      opacity: 0.9;
    }
    button {
      margin-top: 1rem;
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🔔 Chamando morador...</h1>
    <div class="status" id="status">Enviando aviso...</div>
    <button onclick="enviar()">Tentar novamente</button>
  </div>

  <script>
    const TOPICO = "campainha_casa_1";
    const URL = "https://ntfy.sh/" + TOPICO;

    async function enviar() {
      const status = document.getElementById("status");
      status.textContent = "Enviando aviso...";

      try {
        await fetch(URL, {
          method: "POST",
          body: "🔔 Alguém está na portaria!",
          mode: "no-cors" // 👈 evita bloqueio do navegador
        });

        // Com no-cors não dá pra saber resposta real
        status.textContent = "✓ Aviso enviado!";
      } catch (e) {
        status.textContent = "✗ Falha ao enviar";
        console.error(e);
      }
    }

    // dispara automaticamente ao carregar
    window.onload = enviar;
  </script>

</body>
</html>
